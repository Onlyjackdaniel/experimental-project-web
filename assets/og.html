<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<style>
@font-face{font-family:'Kenoky';src:url('../fonts/kenoky-light.otf') format('opentype');}
@font-face{font-family:'Mulish';src:url('https://fonts.gstatic.com/s/mulish/v13/1Ptyg83HX_SGhgqk2j0.woff2') format('woff2');}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;overflow:hidden;}
.card{width:1200px;height:630px;background:#483720;position:relative;
  font-family:'Mulish',sans-serif;color:#F6F1E8;padding:80px 90px;display:flex;flex-direction:column;justify-content:space-between;}
.sun{position:absolute;right:-80px;top:-80px;width:420px;height:420px;}
.eyebrow{font-weight:700;letter-spacing:.32em;text-transform:uppercase;font-size:20px;color:#D4C2A3;}
.title{font-family:'Kenoky',serif;font-size:118px;line-height:.98;color:#FBF9F4;letter-spacing:-.5px;}
.title em{font-style:normal;color:#9A673E;}
.lead{font-size:27px;color:rgba(246,241,232,.85);max-width:760px;line-height:1.4;margin-top:10px;}
.foot{display:flex;justify-content:space-between;align-items:flex-end;}
.brand{font-family:'Kenoky',serif;font-size:34px;color:#D4C2A3;}
.brand small{display:block;font-family:'Mulish';font-weight:700;font-size:12px;letter-spacing:.42em;color:#9A673E;margin-top:6px;}
.loc{font-size:19px;color:#D4C2A3;font-weight:600;letter-spacing:.04em;}
.rule{height:3px;width:180px;background:#9A673E;margin:26px 0;}
</style></head>
<body>
<div class="card">
  <svg class="sun" viewBox="0 0 64 64"><circle cx="32" cy="32" r="22" fill="none" stroke="#5F6B4E" stroke-width="1.4" opacity=".5"/><path d="M10 32a22 22 0 0 1 44 0Z" fill="#9A673E" opacity=".9"/></svg>
  <div>
    <div class="eyebrow">Experiencias curadas · Cancún</div>
  </div>
  <div>
    <div class="title">Un espacio<br>para <em>volver</em> a ti.</div>
    <div class="rule"></div>
    <div class="lead">No vienes por lo que hacemos. Vienes por cómo quieres sentirte al salir.</div>
  </div>
  <div class="foot">
    <div class="brand">experimental<small>body · mind · soul</small></div>
    <div class="loc">Casa Ixum, Cancún</div>
  </div>
</div>
</body></html>
